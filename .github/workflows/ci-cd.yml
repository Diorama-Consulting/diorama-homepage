# .github/workflows/ci-cd.yml — Docker/GHCR version
#
# Replaces the rsync+PM2 pipeline. Flow:
#   push to main (or Keystatic save) → typecheck → build Docker image on the
#   runner → push to GitHub Container Registry → SSH to droplet →
#   `docker compose pull && up -d diorama` (a few seconds of work; the 2 GB
#   droplet never compiles anything).
#
# One-time setup on the droplet (lets it pull from GHCR):
#   1. Create a GitHub PAT (classic) with ONLY the read:packages scope
#   2. On the droplet: echo "PAT" | docker login ghcr.io -u YOUR_GH_USERNAME --password-stdin
#
# Repo secrets needed (Settings → Secrets → Actions):
#   DEPLOY_SSH_KEY, DEPLOY_HOST, DEPLOY_USER          (same as before)
#   PUBLIC_POSTHOG_PROJECT_TOKEN, PUBLIC_POSTHOG_HOST (same as before)
#   SITE_DOMAIN                                       (same as before)
# DEPLOY_PATH is no longer needed — the app lives in the image, not on disk.

name: CI / CD

on:
  push:
    branches: [main]
  pull_request:
    branches: [main]
  workflow_dispatch: {}

concurrency:
  group: ${{ github.workflow }}-${{ github.ref }}
  cancel-in-progress: true

env:
  IMAGE: ghcr.io/dioramaconsulting/diorama-homepage

jobs:
  # ------------------------------------------------------------- checks --
  check:
    name: Typecheck
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-node@v4
        with:
          node-version: '24'
          cache: 'npm'
      - run: npm ci
      - run: npx astro check

  # -------------------------------------------------------- build image --
  build:
    name: Build & push image
    needs: check
    runs-on: ubuntu-latest
    permissions:
      contents: read
      packages: write        # allows pushing to ghcr.io with GITHUB_TOKEN
    steps:
      - uses: actions/checkout@v4

      - uses: docker/setup-buildx-action@v3

      - name: Log in to GHCR
        uses: docker/login-action@v3
        with:
          registry: ghcr.io
          username: ${{ github.actor }}
          password: ${{ secrets.GITHUB_TOKEN }}

      - name: Build (and push on main)
        uses: docker/build-push-action@v6
        with:
          context: .
          push: ${{ github.event_name == 'push' && github.ref == 'refs/heads/main' }}
          tags: |
            ${{ env.IMAGE }}:latest
            ${{ env.IMAGE }}:${{ github.sha }}
          cache-from: type=gha
          cache-to: type=gha,mode=max
          build-args: |
            PUBLIC_POSTHOG_PROJECT_TOKEN=${{ secrets.PUBLIC_POSTHOG_PROJECT_TOKEN }}
            PUBLIC_POSTHOG_HOST=${{ secrets.PUBLIC_POSTHOG_HOST }}
            SITE_DOMAIN=${{ secrets.SITE_DOMAIN }}

  # -------------------------------------------------------------- deploy --
  deploy:
    name: Deploy to droplet
    needs: build
    if: github.event_name == 'push' && github.ref == 'refs/heads/main'
    runs-on: ubuntu-latest
    steps:
      - name: Load deploy SSH key
        uses: webfactory/ssh-agent@v0.9.0
        with:
          ssh-private-key: ${{ secrets.DEPLOY_SSH_KEY }}

      - name: Trust the host key
        run: |
          mkdir -p ~/.ssh
          ssh-keyscan -H "${{ secrets.DEPLOY_HOST }}" >> ~/.ssh/known_hosts

      - name: Pull new image and restart the service
        run: |
          ssh "${{ secrets.DEPLOY_USER }}@${{ secrets.DEPLOY_HOST }}" '
            set -e
            cd /opt/apps
            docker compose pull diorama
            docker compose up -d diorama
            docker image prune -f
          '
