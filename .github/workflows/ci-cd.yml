name: CI / CD

# Runs on every push (this is also what fires when Keystatic saves an edit —
# GitHub-mode Keystatic commits straight to `main` via the GitHub API, which
# is indistinguishable from a normal `git push` as far as Actions is
# concerned) and on every pull request, so feature-branch work gets the same
# build/typecheck signal before it's merged.
on:
  push:
    branches: [main]
  pull_request:
    branches: [main]
  workflow_dispatch: {} # lets you re-run a deploy manually from the Actions tab

concurrency:
  group: ${{ github.workflow }}-${{ github.ref }}
  cancel-in-progress: true

jobs:
  # ---------------------------------------------------------------------
  # CHECKS — this is the "subject to checks" gate. It runs identically
  # whether the push came from `git push`, a merged PR, or Keystatic. The
  # deploy job below only runs if this one succeeds (`needs: build`), so a
  # commit that fails to typecheck or build simply never reaches the server
  # — it sits in git history same as any other bad commit would.
  # ---------------------------------------------------------------------
  build:
    name: Typecheck & build
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-node@v4
        with:
          node-version: '22' # Astro 6 requires Node 22.12+
          cache: 'npm'

      - name: Install dependencies
        run: npm ci

      - name: Typecheck (Astro + TypeScript)
        run: npx astro check

      - name: Build
        run: npm run build
        env:
          # astro build does NOT need real secrets for server-only vars:
          # ANTHROPIC_API_KEY / DATABASE_URL / RESEND_API_KEY / the Google
          # Sheets vars are read from process.env at RUNTIME by the
          # @astrojs/node output, not inlined at build time — placeholders
          # are fine for these, purely so nothing throws on an undefined var.
          ANTHROPIC_API_KEY: build-placeholder
          DATABASE_URL: postgres://placeholder/placeholder
          RESEND_API_KEY: build-placeholder
          # PUBLIC_-prefixed vars are the opposite: anything referenced in
          # client-side code (like the posthog.astro snippet, included on
          # every statically-prerendered page) gets its VALUE baked directly
          # into the shipped HTML at build time, here, on this runner — not
          # read from the server's .env at request time. Confirmed directly:
          # without the real value here, every page ships with a literal
          # `const apiKey = undefined`, and PostHog never actually receives
          # any client-side events no matter what the server's .env has.
          # These need to be the real values, not placeholders.
          PUBLIC_POSTHOG_PROJECT_TOKEN: ${{ secrets.PUBLIC_POSTHOG_PROJECT_TOKEN }}
          PUBLIC_POSTHOG_HOST: ${{ secrets.PUBLIC_POSTHOG_HOST }}

      # Only needed on the runs that might actually deploy.
      - name: Upload build output
        if: github.event_name == 'push' && github.ref == 'refs/heads/main'
        uses: actions/upload-artifact@v4
        with:
          name: site-build
          path: |
            dist/
            package.json
            package-lock.json
            deploy/ecosystem.config.cjs
          retention-days: 3

  # ---------------------------------------------------------------------
  # DEPLOY — only runs after `build` succeeds, and only for pushes to main.
  # Ships the artifact built above (not a fresh clone+build on the server),
  # so the production box never needs devDependencies or the full toolchain.
  # ---------------------------------------------------------------------
  deploy:
    name: Deploy to server
    needs: build
    if: github.event_name == 'push' && github.ref == 'refs/heads/main'
    runs-on: ubuntu-latest
    steps:
      - uses: actions/download-artifact@v4
        with:
          name: site-build
          path: build-output

      - name: Load deploy SSH key
        uses: webfactory/ssh-agent@v0.9.0
        with:
          ssh-private-key: ${{ secrets.DEPLOY_SSH_KEY }}

      - name: Trust the host key
        run: |
          mkdir -p ~/.ssh
          ssh-keyscan -H "${{ secrets.DEPLOY_HOST }}" >> ~/.ssh/known_hosts

      - name: Rsync build output to the server
        run: |
          rsync -az --delete --exclude='.env' \
            build-output/dist/ \
            build-output/package.json \
            build-output/package-lock.json \
            build-output/deploy/ecosystem.config.cjs \
            "${{ secrets.DEPLOY_USER }}@${{ secrets.DEPLOY_HOST }}:${{ secrets.DEPLOY_PATH }}/"

      - name: Install production deps and restart
        run: |
          ssh "${{ secrets.DEPLOY_USER }}@${{ secrets.DEPLOY_HOST }}" '
            set -e
            cd "${{ secrets.DEPLOY_PATH }}"
            npm ci --omit=dev
            pm2 reload ecosystem.config.cjs --update-env
          '
          # Passing the FILE (not just the process name) forces PM2 to
          # re-require ecosystem.config.cjs — which is what actually re-runs
          # the dotenv.config() call at its top — and --update-env tells PM2
          # to apply the freshly-loaded values to the process. Confirmed by
          # direct testing that BOTH parts are required: `pm2 reload
          # diorama-homepage` (by name only, no flag) silently keeps
          # whatever env existed at the process's original `pm2 start`,
          # even across repeated reloads — new .env entries never reach the
          # running app without this. `--update-env` alone (still by name)
          # isn't sufficient either; it has to be the file.
          #
          # systemd instead of PM2? Swap the two lines above for:
          #   sudo systemctl restart diorama-homepage