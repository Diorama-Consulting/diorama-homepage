<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 200 200">
  <defs>
    <linearGradient id="g1" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" stop-color="#FF0080" />
      <stop offset="100%" stop-color="#FF8C00" />
    </linearGradient>
    <linearGradient id="g2" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" stop-color="#FF8C00" />
      <stop offset="100%" stop-color="#FFD700" />
    </linearGradient>
    <linearGradient id="g3" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" stop-color="#FFD700" />
      <stop offset="100%" stop-color="#00FF80" />
    </linearGradient>
    <linearGradient id="g4" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" stop-color="#00FF80" />
      <stop offset="100%" stop-color="#00BFFF" />
    </linearGradient>
    <linearGradient id="g5" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" stop-color="#00BFFF" />
      <stop offset="100%" stop-color="#8000FF" />
    </linearGradient>
    <linearGradient id="g6" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" stop-color="#8000FF" />
      <stop offset="100%" stop-color="#FF0080" />
    </linearGradient>

    <path id="swirl" d="M 0,0 C 70,-20 100,-80 0,-100 C -30,-50 -20,-20 0,0 Z" />
  </defs>

  <style>
    /* Adapts the background automatically based on browser/OS theme */
    .bg { fill: #ffffff; }
    @media (prefers-color-scheme: dark) {
      .bg { fill: #111111; }
    }
  </style>

  <circle cx="100" cy="100" r="100" class="bg" />

  <g transform="translate(100, 100)">
    <use href="#swirl" fill="url(#g1)" opacity="0.8" />
    <use href="#swirl" fill="url(#g2)" opacity="0.8" transform="rotate(60)" />
    <use href="#swirl" fill="url(#g3)" opacity="0.8" transform="rotate(120)" />
    <use href="#swirl" fill="url(#g4)" opacity="0.8" transform="rotate(180)" />
    <use href="#swirl" fill="url(#g5)" opacity="0.8" transform="rotate(240)" />
    <use href="#swirl" fill="url(#g6)" opacity="0.8" transform="rotate(300)" />
  </g>
  
  <circle cx="100" cy="100" r="16" class="bg" />
</svg>