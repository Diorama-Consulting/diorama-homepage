heading: Meet Mal
paragraphs:
  - >-
    Mal Minhas founded Diorama Consulting in 2024 to help Boards, Founders and
    Investors turn product, technology and AI strategy into commercial outcomes
    through fractional CTO/CPTO leadership and AI enablement including platform
    modernisation and organisation design, with a particular focus on D2C
    marketplaces and consumer products.
  - >-
    Alongside advisory work, Mal serves as a Trustee for two UK charities:
    Helpforce, which supports NHS trusts and community organisations to build
    high-impact volunteering programmes across the health system, and
    Aston-Mansfield, which supports children, young people and families in
    Newham and east London.
  - >-
    Mal speaks and emcees talks regularly on AI strategy, modern platforms and
    technology leadership, notably with London Tech Leaders. He also builds
    products and tools that combine these interests.
  - >-
    Get in touch to discuss a consulting engagement, or a Non-Executive Director
    or Trustee appointment or to learn more about what we are working on.
teamHeading: A small team, for tailored support
