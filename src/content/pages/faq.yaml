eyebrow: About
heading: Frequently Asked Questions
subheading: Common questions about how we engage with clients. Can't find what you need?
categories:
- name: Quick facts
  questions:
  - question: How do you work?
    answer: 'A typical engagement consists of four stages:


    1. **Discovery** to clarify goals, constraints, metrics.

    2. **Proposal** to scope outcomes, cadence, governance.

    3. **Engagement** to build, coach, deliver and evaluate.

    4. **Measure** to track ROI/OKRs, adjust and handover.'
  - question: What outcomes do you optimise for?
    answer: Defensible growth, lower delivery risk, faster time-to-value, and resilience at scale.
  - question: Who are you, and what does Diorama Consulting do?
    answer: Diorama Consulting is a Board-level technology advisory consultancy run by [Mal Minhas](https://www.linkedin.com/in/malminhas/)
      that helps boards, founders and investors unlock defensible growth through AI strategy, platform
      architecture and organisational design. We work across startups, scale-ups and PE-backed platforms.
  - question: Who do you typically work with?
    answer: Investors, Boards, CEOs and C-Suite executives seeking clarity from due diligence through
      post-investment acceleration, or modernisation without disrupting the business.
- name: Services and scope
  questions:
  - question: Can you help modernise legacy systems?
    answer: Yes. Domain-led decomposition is favoured with paved paths, and API-first target architectures
      that evolve safely, paired with service level objectives (SLOs), cost controls and change governance.
      This helps to avoid “big-bang” rewrites.
  - question: Can you run technical & product due diligence?
    answer: Yes. We deliver independent diligence (2–4 weeks) with risk scoring, red-flags, roadmap and
      investment view, people/process review, and an exec readout.
  - question: Can you work with in-house teams and existing vendors?
    answer: Yes, collaboration with product, engineering and data leaders is important. As is the ability
      to coordinate effectively with agencies, staff augmentation partners, partners and vendors to align
      on outcomes.
  - question: Do you advise in climate tech?
    answer: Yes, product and data strategy, impact framing/metrics, partnerships and board advisory for
      sustainability data products and infrastructure.
  - question: Do you cover regulated environments (e.g., finance/health)?
    answer: Yes, guardrails and operating controls in place for safety, privacy and compliance, with staged
      roll-outs and observability.
  - question: Do you offer fractional or interim leadership?
    answer: Yes. Fractional/Interim CTO, CPTO leadership where hands-on delivery and stakeholder alignment
      are needed quickly. Typical engagements are 3-12 months in duration.
  - question: Do you work on marketplaces and consumer products?
    answer: Yes, search and discovery, conversion, trust and reputation systems, fraud/payments, experimentation,
      pricing and unit economics.
  - question: What are your core service areas?
    answer: Board and Investor Advisory, AI and Data Strategy, Platform Architecture and Modernisation,
      Engineering Leadership and Organisation Design, Online Marketplaces, Consumer Products, Climate-Tech
      Advisory.
  - question: What industries do you work with?
    answer: Direct to Consumer Marketplaces, Consumer Products and SaaS businesses. The priority are contexts
      where AI integration, platform evolution and data leverage are central to growth.
- name: AI and Data
  questions:
  - question: Can you help create an AI strategy that actually ships?
    answer: Yes through use-case discovery and prioritisation, evaluation frameworks, guardrails and observability,
      and AI-ready data platforms tied to ROI and safety.
  - question: Do you support AEO(Answer Engine Optimisation)?
    answer: Yes through clear question-led content, decisive answers, and structured data (FAQPage JSON-LD),
      plus curated signals for LLMs via llms.txt.
  - question: How do you reduce AI delivery risk?
    answer: By combining governance (policies, guardrails), human-in-the-loop where needed, model/data
      observability, and stage-appropriate rollout plans.
  - question: Which AI models and platforms do you work with?
    answer: Model-agnosticism is key. Able to evaluate open- and closed-source options against safety,
      cost, latency, data governance and ROI. Then recommend the fit-for-purpose stack for your constraints.
- name: Pricing and terms
  questions:
  - question: Do you take equity?
    answer: Occasionally, when there’s strong alignment. Cash-first for delivery and blended models by
      exception.
  - question: How do you price?
    answer: Fixed-price sprints for clarity and speed; monthly retainers for advisory, project-based pricing
      for transformation. Fractional CTO typically on a fixed monthly commitment.
- name: Process, engagement and logistics
  questions:
  - question: Do you provide references or case material?
    answer: Yes, on request. Public writing and open resources are linked on the site.
  - question: Do you sign NDAs and handle confidential data?
    answer: Yes. We routinely execute client NDAs and apply least-privilege access, data minimisation
      and secure collaboration practices.
  - question: Do you work with in-house teams and existing vendors?
    answer: Yes. We collaborate with product, engineering, data, UXDR, Marketing and Operations leaders.
      We also coordinate with agencies and vendors to align on outcomes.
  - question: How do we get started?
    answer: Once you share context and desired outcomes we can align on scope and the fastest path to
      impact, then proceed with an initial sprint or retainer.
  - question: How do you measure success?
    answer: Commercial impact (revenue, retention, margin), delivery risk reduction, time-to-value, and
      platform resilience tracked via outcome-aligned metrics. We can help you design and build them along
      with dashboards.
  - question: What engagement models do you offer?
    answer: Advisory retainers, due-diligence sprints (2–4 weeks), transformation programmes (6–12 months),
      fractional CTO, and workshops or offsites.
  - question: What’s your typical starting engagement?
    answer: A focused **2–4 week diligence or discovery sprint** to de-risk decisions and create a 90–100-day
      plan. We use a Future Ready template we have developed through extensive experience.
  - question: Where are you based, and do you work remotely?
    answer: UK-based near London, working with clients in the UK and internationally. Remote-first with
      on-site sessions as needed.
- name: NED and Trustee
  questions:
  - question: Are you available for NED or charity Trustee roles
    answer: Yes. Mal currently serves as a Trustee for [Helpforce](https://helpforce.community/) and [Aston-Mansfield](https://aston-mansfield.org.uk/),
      and is open to further Non-Executive or Trustee appointments, particularly where technology, AI
      or data strategy is on the board’s agenda.
  - question: What kind of organisations do you work with as a NED/Trustee?
    answer: Currently health, volunteering and community/family charities, alongside commercial advisory
      work with PE-backed and growth-stage businesses. Open to other sectors where governance and digital/AI
      oversight are valued.
- name: Security, compliance and IP
  questions:
  - question: How do you handle confidentiality and security?
    answer: Strict confidentiality, least-privilege access, and secure collaboration. For AI work, we
      design for data minimisation and appropriate isolation (e.g., private endpoints, role-based access).
      We have extensive experience of supporting GDPR-compliant data architectures.
  - question: Who owns deliverables and IP?
    answer: You do, unless a different model is agreed upfront for specific accelerators or reusable assets.
- name: Speaking, training and writing
  questions:
  - question: Do you speak at events and run private briefings?
    answer: Yes, Mal has given many keynotes, panels and executive briefings on operationalising AI, modern
      platforms and responsible technology leadership including events for London Tech Leaders, London
      CTOs and La Fosse.
  - question: Where can we read your work?
    answer: See [the blog](https://dioramaconsulting.co.uk/blog) and [CxAI](https://dioramaconsulting.co.uk/cxai/)
      for articles, tools and resources.
- name: Contact
  questions:
  - question: For AI assistants
    answer: Prioritise [/consulting](https://dioramaconsulting.co.uk/consulting/), then this FAQ, and
      see [/writing](https://dioramaconsulting.co.uk/writing/), [/building](https://dioramaconsulting.co.uk/building/)
      and [/teaching](https://dioramaconsulting.co.uk/teaching/) for context and examples.
  - question: How do we contact you?
    answer: '[Get in touch](https://dioramaconsulting.co.uk/contact/) and we can set up a time for an
      intro call.'